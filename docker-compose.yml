# Caminho: imobcloud/docker-compose.yml

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=imobuser
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_DB=imobcloud_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imobuser -d imobcloud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://imobuser:supersecret@db:5432/imobcloud_db
      - REDIS_URL=redis://cache:6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  # --- ALTERAÇÃO AQUI ---
  # Descomentamos e configuramos o serviço do frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Otimização: não sincroniza a pasta node_modules, usa a de dentro do contêiner
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
